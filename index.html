<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istanbul Metro Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; 
            height: 100vh; overflow: hidden; 
            background: #0a0a0a; color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        #sidebar { 
            width: 280px; 
            background: rgba(20, 20, 20, 0.95); 
            padding: 20px; 
            overflow-y: auto; 
            z-index: 1000; 
            box-shadow: 5px 0 15px rgba(0,0,0,0.8);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px);
        }
        #sidebar.collapsed {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }
        
        #sidebar h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 25px; letter-spacing: 1px;}
        .filter-item { margin-bottom: 12px; display: flex; align-items: center; font-size: 14px; }
        .filter-item input { margin-right: 12px; cursor: pointer; accent-color: #fff; }
        
        #map { flex-grow: 1; height: 100vh; background: #0a0a0a; z-index: 1;}
        
        #toggle-btn {
            position: absolute;
            top: 15px; left: 15px;
            z-index: 2000;
            background: #222; color: #fff;
            border: 1px solid #444; border-radius: 6px;
            padding: 8px 15px; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        #toggle-btn:hover { background: #444; }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #222; color: #fff; }
    </style>
</head>
<body>

<button id="toggle-btn">☰ Routes</button>

<div id="sidebar">
    <h2>ISTANBUL METRO</h2>
    <input type="text" id="route-search" placeholder="Search M1, Marmaray..." style="width: 100%; padding: 10px; margin-bottom: 20px; box-sizing: border-box; background: #111; color: white; border: 1px solid #444; border-radius: 4px;">
    <div id="route-filters"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script type="module" src="./main.js"></script>

</body>
</html>
